<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEDX Platform</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        async function callGoogleAI(queries) {
            const response = await fetch('YOUR_GOOGLE_GENERATIVE_AI_API_URL', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer YOUR_ACCESS_TOKEN',
                },
                body: JSON.stringify({ queries })
            });
            return response.json();
        }

        $(document).ready(function() {
            $('#send-button').click(async function() {
                const userQuery = $('#user-input').val();
                const aiResponse = await callGoogleAI(userQuery);
                $('#chat-area').append(`<div>You: ${userQuery}</div>`);
                $('#chat-area').append(`<div>AI: ${aiResponse}</div>`);
            });
        });
    </script>
</head>
<body>
    <div id="chat-container">
        <h1>MEDX AI Chatbot</h1>
        <div id="chat-area" style="border: 1px solid #ccc; padding: 10px; height: 300px; overflow-y: scroll;"></div>
        <input type="text" id="user-input" placeholder="Type your message here..." />
        <button id="send-button">Send</button>
    </div>
</body>
</html>
